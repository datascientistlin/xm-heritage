<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>厦门非遗展示</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 视频容器 - 开场视频 -->
    <div id="video-container">
        <video id="start-video" playsinline>
            <source src="assets/start_video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 装饰元素容器 -->
    <div class="decoration-dots">
        <div class="shell"></div>
        <div class="shell"></div>
        <div class="shell"></div>
        <div class="shell"></div>
        <div class="shell"></div>
        <div class="shell"></div>
        <div class="shell"></div>
        <div class="shell"></div>
    </div>

    <div class="container">
        <!-- 欢迎标题 -->
        <header>
            <h1>欢迎来到厦门非遗的世界！</h1>
        </header>

        <main>
            <!-- 小讲解员图片 - 点击触发作品欣赏 -->
            <div class="chicken-container">
                <img id="chicken-img" src="assets/images/start.jpeg" alt="小讲解员" class="chicken-img">
            </div>

            <!-- 对话气泡/聊天记录 -->
            <div class="speech-bubble" id="speech-bubble">
                <p id="speech-text">你好！我是厦门非遗小讲解员，很高兴见到你！</p>
            </div>

            <div id="chat-log" class="chat-log"></div>

            <!-- 语音按钮 - 底部居中 -->
            <div class="voice-section">
                <div class="asr-status-display">
                    <span class="status-indicator" id="asr-status-indicator"></span>
                    <span class="status-text" id="asr-status-text">等待连接...</span>
                </div>
                <button id="voice-btn" class="voice-btn">🎤</button>
                <span id="voice-btn-text" class="voice-btn-text">按住说话</span>
            </div>
        </main>

        <footer>
            <p>点击小讲解员一起欣赏厦门非遗作品吧！</p>
        </footer>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
