<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大湾鸡互动陪伴</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>欢迎来到大湾鸡的世界！</h1>
        </header>

        <main>
            <div class="chicken-container">
                <img id="chicken-img" src="assets/images/Front.jpeg" alt="大湾鸡" class="chicken-img">
            </div>

            <div class="speech-bubble" id="speech-bubble">
                <p id="speech-text">你好！我是大湾鸡，很高兴见到你！</p>
            </div>

            <div id="chat-log" class="chat-log"></div>

            <!-- Consolidated Controls -->
            <div class="consolidated-controls">
                <div class="voice-interaction-section">
                    <button id="voice-interact-btn" class="control-btn voice-interact-btn">
                        <span class="btn-icon">🎤</span> 语音互动
                    </button>
                    <div class="asr-status-display">
                        <span class="status-indicator" id="asr-status-indicator"></span>
                        <span class="status-text" id="asr-status-text">状态：未知</span>
                    </div>
                </div>

                <div class="image-interaction-section">
                    <button id="image-interact-btn" class="control-btn image-interact-btn">
                        <span class="btn-icon">🐔</span> 形象互动
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>与大湾鸡一起快乐玩耍吧！</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
